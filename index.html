<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATURN | GRAVITY FIELD v12.0</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; text-transform: uppercase; letter-spacing: 1px; }
        
        /* 视频预览窗口：极简、半透明 */
        #v { position: absolute; width: 160px; height: 120px; bottom: 20px; right: 20px; transform: scaleX(-1); border-radius: 8px; opacity: 0.3; border: 1px solid rgba(255,255,255,0.2); background: #000; transition: opacity 0.3s; z-index: 10; }
        #v:hover { opacity: 0.7; }

        /* 现代UI面板：毛玻璃质感 */
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 15px; z-index: 20; width: 220px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        
        .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 11px; color: rgba(255,255,255,0.7); }
        
        /* 自定义颜色选择器样式 */
        .color-wrapper { display: flex; align-items: center; gap: 8px; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; background: transparent; padding: 0; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }

        /* 极简按钮 */
        button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; transition: all 0.2s; width: 100%; }
        button:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); }
        
        #st { font-size: 9px; text-align: center; margin-top: 5px; }

        /* 初始化遮罩层 */
        #guide { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 100; font-weight: 100; letter-spacing: 15px; font-size: 14px; color: rgba(255,255,255,0.8); }
        #guide:hover { color: #fff; background: #050505; }
    </style>
</head>
<body>
    <div id="guide" onclick="initSystem()">[ 点击初始化全息土星 ]</div>
    
    <div id="ui">
        <div style="font-size: 14px; font-weight: 200; letter-spacing: 4px; margin-bottom: 5px; text-align: center;">STARDUST核心</div>
        <div class="row">
            <label>星球体颜色</label>
            <div class="color-wrapper">
                <input type="color" id="coreC" value="#3366cc">
            </div>
        </div>
        <div class="row">
            <label>扁平光环颜色</label>
            <div class="color-wrapper">
                <input type="color" id="ringC" value="#ccaa88">
            </div>
        </div>
        <div style="border-top: 1px solid rgba(255,255,255,0.1); margin: 5px 0;"></div>
        <button onclick="toggleFullScreen()">全屏模式</button>
        <div id="st" style="color: rgba(255,255,255,0.4);">等待追踪...</div>
    </div>
    
    <video id="v" autoplay muted playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, saturn, ring;
        let handDist = 0.35, handX = 0, handY = 0; // 核心手势数据
        let cExplode = 1, rExplode = 1, cVel = 0, rVel = 0; // 物理引擎变量
        const PARTICLE_COUNT = 30000; // 星球体粒子
        const RING_COUNT = 50000;     // 光环粒子
        
        // --- 核心物理参数调优 ---
        const tension = 0.25;  // 弹簧张力：数值越大，拉扯越灵敏
        const friction = 0.82; // 物理阻尼：数值越大，回弹越有质感

        // 1. 初始化 Three.js 场景
        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 45); // 稍微居高临下的视角
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 优化高清屏性能
            document.body.appendChild(renderer.domElement);
        }

        // 2. 创建土星和光环粒子系统（保证可见间隙）
        function createSaturn() {
            // A. 土星核心 (球体，使用 PointsMaterial 保证颗粒感)
            const cGeo = new THREE.BufferGeometry();
            const cPos = new Float32Array(PARTICLE_COUNT * 3);
            const cOrg = new Float32Array(PARTICLE_COUNT * 3);
            const cColors = new Float32Array(PARTICLE_COUNT * 3);
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                // 使用立方根分布，让球体内部粒子均匀
                const r = 9 * Math.cbrt(Math.random()); 
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                cPos[i3] = cOrg[i3] = r * Math.sin(phi) * Math.cos(theta);
                cPos[i3+1] = cOrg[i3+1] = r * Math.sin(phi) * Math.sin(theta);
                cPos[i3+2] = cOrg[i3+2] = r * Math.cos(phi);
            }
            cGeo.setAttribute('position', new THREE.BufferAttribute(cPos, 3));
            cGeo.setAttribute('color', new THREE.BufferAttribute(cColors, 3));
            cGeo.userData.origin = cOrg; // 储存原始位置用于缩放计算
            
            // 使用 AdditiveBlending 增加全息感，size 确保间隙可见
            const cMat = new THREE.PointsMaterial({ size: 0.15, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.9 });
            saturn = new THREE.Points(cGeo, cMat);
            
            // B. 土星光环 (扁平圆环)
            const rGeo = new THREE.BufferGeometry();
            const rPos = new Float32Array(RING_COUNT * 3);
            const rOrg = new Float32Array(RING_COUNT * 3);
            const rColors = new Float32Array(RING_COUNT * 3);
            
            for (let i = 0; i < RING_COUNT; i++) {
                const i3 = i * 3;
                // 光环半径分布：13-24
                const r = 13 + Math.random() * 11;
                const theta = Math.random() * Math.PI * 2;
                rPos[i3] = rOrg[i3] = r * Math.cos(theta);
                // 极薄的垂直厚度
                rPos[i3+1] = rOrg[i3+1] = (Math.random() - 0.5) * 0.2;
                rPos[i3+2] = rOrg[i3+2] = r * Math.sin(theta);
            }
            rGeo.setAttribute('position', new THREE.BufferAttribute(rPos, 3));
            rGeo.setAttribute('color', new THREE.BufferAttribute(rColors, 3));
            rGeo.userData.origin = rOrg;
            
            const rMat = new THREE.PointsMaterial({ size: 0.12, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.8 });
            ring = new THREE.Points(rGeo, rMat);
            
            scene.add(saturn);
            scene.add(ring);
            
            // 初始倾斜，符合土星特征
            saturn.rotation.x = Math.PI / 7;
            ring.rotation.x = Math.PI / 7;
        }

        // 3. 实时颜色更新逻辑
        function updateParticleColors() {
            const coreColor = new THREE.Color(document.getElementById('coreC').value);
            const ringColor = new THREE.Color(document.getElementById('ringC').value);
            
            const cCols = saturn.geometry.attributes.color.array;
            const rCols = ring.geometry.attributes.color.array;
            
            // 核心颜色映射
            for (let i = 0; i < PARTICLE_COUNT * 3; i+=3) {
                // 加入微小的亮度随机，增加粒子层次感
                const br = 0.9 + Math.random() * 0.1;
                cCols[i] = coreColor.r * br; cCols[i+1] = coreColor.g * br; cCols[i+2] = coreColor.b * br;
            }
            
            // 光环颜色映射
            for (let i = 0; i < RING_COUNT * 3; i+=3) {
                const br = 0.8 + Math.random() * 0.2;
                rCols[i] = ringColor.r * br; rCols[i+1] = ringColor.g * br; rCols[i+2] = ringColor.b * br;
            }
            
            saturn.geometry.attributes.color.needsUpdate = true;
            ring.geometry.attributes.color.needsUpdate = true;
        }

        // 4. 核心初始化：绑定MediaPipe和Three.js
        window.initSystem = async () => {
            document.getElementById('guide').style.display = 'none';
            initScene();
            createSaturn();
            updateParticleColors();

            // 绑定颜色选择器事件
            document.getElementById('coreC').addEventListener('input', updateParticleColors);
            document.getElementById('ringC').addEventListener('input', updateParticleColors);

            // --- 零延迟双手手势引擎 ---
            const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
            // 使用 modelComplexity: 1 平衡速度与精度
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            
            hands.onResults(results => {
                const stEl = document.getElementById('st');
                if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {
                    const lm = results.multiHandLandmarks[0];
                    
                    // A. 缩放控制：大拇指(4)与小指(20)的屏幕绝对距离
                    // 这种计算方式比之前的归一化比例更暴力、更灵敏
                    const dx = lm[4].x - lm[20].x;
                    const dy = lm[4].y - lm[20].y;
                    handDist = Math.sqrt(dx*dx + dy*dy);
                    
                    // B. 位置跟随：使用中指根部(9)作为重力中心
                    handX = (lm[9].x - 0.5) * -75; // 映射到Three.js坐标系
                    handY = (lm[9].y - 0.5) * -55;
                    
                    stEl.innerText = "追踪锁定";
                    stEl.style.color = "rgba(0,255,255,0.6)";
                } else {
                    handDist = 0.35; // 丢失时回归默认缩放
                    stEl.innerText = "追踪丢失";
                    stEl.style.color = "rgba(255,100,100,0.6)";
                }
            });

            const cam = new Camera(document.getElementById('v'), {
                onFrame: async () => { await hands.send({image: document.getElementById('v')}); },
                width: 640, height: 480
            });
            cam.start();
            animate();
        };

        // 5. 物理渲染循环：粒子拉扯的核心
        function animate() {
            requestAnimationFrame(animate);

            // --- 核心算法：弹簧动力学 (零延迟反馈) ---
            
            // 核心球体目标缩放 (基础1.0 + 手势距离拉扯)
            const targetC = 1.0 + (handDist * 4.5); 
            // 光环目标缩放 (扩散范围比球体更大)
            const targetR = 1.0 + (handDist * 6.5);

            // 计算球体加速度 -> 速度 -> 位置
            cVel += (targetC - cExplode) * tension;
            cVel *= friction;
            cExplode += cVel;

            // 计算光环加速度 -> 速度 -> 位置
            rVel += (targetR - rExplode) * tension;
            rVel *= friction;
            rExplode += rVel;

            // --- 应用物理位移 ---
            
            // A. 土星跟随手部移动 (带一点平滑延迟，增加质感)
            saturn.position.x += (handX - saturn.position.x) * 0.15;
            saturn.position.y += (handY - saturn.position.y) * 0.15;
            ring.position.x = saturn.position.x;
            ring.position.y = saturn.position.y;

            // B. 更新粒子相对位置 (核心重构点：每一帧基于原始位置重新计算，防止坐标漂移)
            const cPos = saturn.geometry.attributes.position.array;
            const cOrg = saturn.geometry.userData.origin;
            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                cPos[i] = cOrg[i] * cExplode;
            }
            
            const rPos = ring.geometry.attributes.position.array;
            const rOrg = ring.geometry.userData.origin;
            for (let i = 0; i < RING_COUNT * 3; i+=3) {
                // 光环只进行 XZ 轴平面扩散，保持扁平
                rPos[i] = rOrg[i] * rExplode;
                rPos[i+1] = rOrg[i+1]; // Y轴(厚度)不参与手势拉扯
                rPos[i+2] = rOrg[i+2] * rExplode;
            }
            
            saturn.geometry.attributes.position.needsUpdate = true;
            ring.geometry.attributes.position.needsUpdate = true;
            
            // 缓慢自转
            saturn.rotation.y += 0.002;
            ring.rotation.y += 0.002;

            renderer.render(scene, camera);
        }

        // UI控制：全屏
        window.toggleFullScreen = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        };

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
